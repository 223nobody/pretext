name: Pretext Reader CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest --tb=short

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

      - name: Production build
        run: npm run build

  zotero-build:
    name: Zotero Plugin Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zotero-plugin
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: zotero-plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

      - name: Build plugin
        run: npm run build

      - name: Verify package
        run: npm run verify

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: pretext-reader.xpi
          path: zotero-plugin/build/pretext-reader.xpi

  docker-backend:
    name: Docker Build (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-frontend:
    name: Docker Build (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          build-args: |
            VITE_API_URL=http://localhost:8000/api/v1
            VITE_APP_NAME=Pretext Reader
            VITE_DEFAULT_THEME=light
          cache-from: type=gha
          cache-to: type=gha,mode=max
