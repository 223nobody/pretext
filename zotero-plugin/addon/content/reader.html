<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>Pretext Reader</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #111318;
        --page: #171b23;
        --text: #f3eadf;
        --muted: #a9adba;
        --accent: #f4d35e;
      }

      html[data-theme="light"] {
        color-scheme: light;
        --bg: #e8edf4;
        --page: #ffffff;
        --text: #1e2430;
        --muted: #5c6675;
        --accent: #2f80ed;
      }

      html[data-theme="sepia"] {
        color-scheme: light;
        --bg: #ded1bd;
        --page: #f8eedc;
        --text: #2e2419;
        --muted: #6b5c4d;
        --accent: #a85524;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }

      #meta {
        color: var(--muted);
        font-size: 12px;
      }

      .shortcuts-hint {
        color: var(--muted);
        font-size: 11px;
        align-self: center;
      }

      main {
        position: relative;
        overflow: hidden;
        height: calc(100vh - 57px);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1 id="title">Pretext Reader</h1>
        <div id="meta"></div>
      </div>
      <div class="shortcuts-hint">1-4 cols · T theme · [ ] adjust · Esc close</div>
    </header>
    <main id="reader"></main>
    <script src="reader.js"></script>
  </body>
</html>
